name: RabieTV_Final_Simple_Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Clean and Create Project
        run: |
          # 1. تنظيف المجلدات تماماً
          rm -rf *
          mkdir -p app/src/main/java/com/rtv/tv app/src/main/res/layout app/src/main/res/values

          # 2. ملفات الإعدادات (بسيطة جداً لتفادي خطأ Null Object)
          echo "include ':app'" > settings.gradle

          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rtv.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rtv.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # 3. كود الجافا (شاشة ترحيب بسيطة)
          cat <<'EOF' > app/src/main/java/com/rtv/tv/MainActivity.java
          package com.rtv.tv;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          import android.view.Gravity;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText("RabieTV Start Success ✅");
                  tv.setTextSize(24);
                  tv.setGravity(Gravity.CENTER);
                  setContentView(tv);
              }
          }
          EOF

          # 4. المانيفست (Manifest)
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rtv.tv">
              <application android:label="RabieTV Simple">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK with Stable Gradle
        run: |
          # إجبار النظام على استخدام نسخة Gradle مستقرة (8.5) لتجنب أخطاء نسخة 9.3
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Resulting APK
        uses: actions/upload-artifact@v4
        with:
          name: RabieTV_Simple_Success
          path: app/build/outputs/apk/debug/*.apk
