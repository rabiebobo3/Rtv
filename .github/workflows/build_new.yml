name: Rabie TV Final Success
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clean Start
        run: |
          # صنع مجلد جديد ونظيف تماماً
          mkdir -p work/app/src/main/java/com/rtv/tv/
          mkdir -p work/app/src/main/res/layout/
          
          # وضع الكود تاعك (MainActivity.java) في مكانه الصحيح آلياً
          find . -name "MainActivity.java" -exec cp {} work/app/src/main/java/com/rtv/tv/MainActivity.java \;
          
          # نقل ملفات الواجهة (Splash و Main)
          find . -name "splash.xml" -exec cp {} work/app/src/main/res/layout/ \;
          find . -name "main.xml" -exec cp {} work/app/src/main/res/layout/ \;

          # صنع ملف الغرادل الموحد
          cat <<EOF > work/app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rtv.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rtv.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'org.videolan.android:libvlc-all:3.6.0'
          }
          EOF

          echo "include ':app'" > work/settings.gradle
          
          # البناء من المجلد النظيف
          cd work
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Pro
          path: work/app/build/outputs/apk/debug/*.apk
