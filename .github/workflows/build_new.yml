name: RabieTV_Pro_Success
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Industrial_Environment_Setup
        run: |
          # 1. تنظيف شامل وجذري للمستودع
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          # 2. بناء هيكل المشروع (المسارات الإلزامية)
          mkdir -p app/src/main/java/com/rabie/tv app/src/main/res/layout app/src/main/res/values

          # 3. ملف الإعدادات (settings.gradle)
          cat <<'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "RabieTV"
          include ':app'
          EOF

          # 4. ملف بناء التطبيق (app/build.gradle)
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android {
              namespace 'com.rabie.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
          }
          EOF

          # 5. كود الجافا (MainActivity) - هنا وين تعدل الرابط مستقبلاً
          cat <<'EOF' > app/src/main/java/com/rabie/tv/MainActivity.java
          package com.rabie.tv;
          import android.os.Bundle;
          import android.app.Activity;
          import com.google.android.exoplayer2.ExoPlayer;
          import com.google.android.exoplayer2.MediaItem;
          import com.google.android.exoplayer2.ui.PlayerView;

          public class MainActivity extends Activity {
              private ExoPlayer player;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  PlayerView pv = new PlayerView(this);
                  setContentView(pv);
                  player = new ExoPlayer.Builder(this).build();
                  pv.setPlayer(player);
                  // رابط تجريبي - بدله برابط IPTV الخاص بك هنا
                  MediaItem mi = MediaItem.fromUri("https://html5videoformatstest.com/data/res720.mp4");
                  player.setMediaItem(mi);
                  player.prepare();
                  player.play();
              }
              @Override
              protected void onDestroy() { super.onDestroy(); player.release(); }
          }
          EOF

          # 6. المانيفست (تصاريح الإنترنت)
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="Rabie TV PRO" android:usesCleartextTraffic="true">
                  <activity android:name="com.rabie.tv.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Force_Build_Execution
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Export_APK_Link
        uses: actions/upload-artifact@v4
        with:
          name: RabieTV_Final_APK
          path: app/build/outputs/apk/debug/*.apk
