name: RabieTV_Zero_Error_Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force_Modern_Rebuild
        run: |
          # 1. مسح شامل لكل ما هو قديم لضمان عدم التعارض
          rm -rf * mkdir -p app/src/main/java/com/rabie/tv app/src/main/res/layout app/src/main/res/values

          # 2. ملف الإعدادات (settings.gradle) - الطريقة الإلزامية الجديدة
          cat <<'EOF' > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "RabieTV"
          include ':app'
          EOF

          # 3. ملف build.gradle الرئيسي (فارغ مع البلاجن كما يطلبه السيستم)
          echo "plugins { id 'com.android.application' version '8.2.2' apply false }" > build.gradle

          # 4. ملف app/build.gradle (قفل النجاح: namespace + compileSdk)
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rabie.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # 5. ملفات الكود والديزاين (بدون أخطاء)
          echo 'package com.rabie.tv; import android.app.Activity; public class MainActivity extends Activity { @Override protected void onCreate(android.os.Bundle s) { super.onCreate(s); android.widget.TextView t = new android.widget.TextView(this); t.setText("RabieTV PRO\nSUCCESS AT LAST!"); t.setGravity(android.view.Gravity.CENTER); setContentView(t); } }' > app/src/main/java/com/rabie/tv/MainActivity.java
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="RabieTV"><activity android:name="com.rabie.tv.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml

      - name: Build_Action
        run: |
          # إجبار السيستم على استخدام نسخة مستقرة 8.5 لتفادي انهيار Gradle 9.3.1
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload_APK
        uses: actions/upload-artifact@v4
        with:
          name: RabieTV_Final_Result
          path: app/build/outputs/apk/debug/*.apk
