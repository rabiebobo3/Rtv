name: RabieTV_System_Match
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create_Project_Modern_Way
        run: |
          rm -rf *
          mkdir -p app/src/main/java/com/rtv/tv app/src/main/res/layout
          
          # 1. ملف الإعدادات (settings.gradle)
          echo "rootProject.name = 'RabieTV'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # 2. ملف بناء المشروع الرئيسي (Root build.gradle) - إلزامي في النسخة 9
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. ملف بناء التطبيق (app/build.gradle) - النسخة 9 تفرض الـ namespace
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rtv.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rtv.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # 4. كود الجافا والمانيفست (الحد الأدنى للنجاح)
          echo 'package com.rtv.tv; import android.app.Activity; public class MainActivity extends Activity { @Override protected void onCreate(android.os.Bundle s) { super.onCreate(s); android.widget.TextView t = new android.widget.TextView(this); t.setText("MATCHED WITH SYSTEM"); setContentView(t); } }' > app/src/main/java/com/rtv/tv/MainActivity.java
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rtv.tv"><application android:label="RabieTV"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml

      - name: Build_Action
        run: |
          # حتى لو السيستم فرض 9.3، الـ Wrapper هو اللي يحدد "اللغة"
          # إذا أردت استخدام 9.3.1 مباشرة، نكتبها هنا:
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Export_APK
        uses: actions/upload-artifact@v4
        with:
          name: RabieTV_Matched_APK
          path: app/build/outputs/apk/debug/*.apk
