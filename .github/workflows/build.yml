name: Build Rabie TV Pro
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Fix and Prepare
        run: |
          chmod +x fix.sh
          ./fix.sh
          mv app/build2.gradle app/build.gradle
      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Pro
          path: app/build/outputs/apk/debug/*.apk
