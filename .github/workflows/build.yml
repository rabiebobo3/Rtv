name: Rabie TV Final Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Clean and Build Structure
        run: |
          # 1. صنع مجلد المشروع الأساسي
          mkdir -p app/src/main/java/com/rtv/tv/
          mkdir -p app/src/main/res/layout/
          
          # 2. صنع ملف settings.gradle (ضروري جداً)
          echo "include ':app'" > settings.gradle

          # 3. صنع ملف build.gradle للمشروع (المفتاح اللي كان ناقص)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google() ; mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects {
              repositories { google() ; mavenCentral() }
          }
          EOF

          # 4. صنع ملف build.gradle للتطبيق (اللي فيه VLC)
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rtv.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rtv.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'org.videolan.android:libvlc-all:3.6.0'
          }
          EOF

          # 5. نقل ملفاتك لمكانها الصحيح
          find . -name "MainActivity.java" -exec cp {} app/src/main/java/com/rtv/tv/MainActivity.java \;
          find . -name "splash.xml" -exec cp {} app/src/main/res/layout/ \;
          find . -name "main.xml" -exec cp {} app/src/main/res/layout/ \;

          # 6. البناء النهائي
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-VLC-Final
          path: app/build/outputs/apk/debug/*.apk
