name: Build_Real_Android_App
on: [push]
jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate_APK_Files
        run: |
          # تنظيف وبناء الهيكل الحقيقي للتطبيق
          rm -rf *
          mkdir -p app/src/main/java/com/rabie/tv app/src/main/res/layout app/src/main/res/values

          # 1. إعدادات المشروع (المحرك)
          echo "include ':app'" > settings.gradle
          
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # 2. ملف بناء التطبيق (القلب)
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rabie.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # 3. واجهة التطبيق (الديزاين)
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:gravity="center"
              android:background="#000000"
              android:orientation="vertical">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Rabie TV PRO"
                  android:textColor="#FFFFFF"
                  android:textSize="30sp"
                  android:textStyle="bold" />
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Real App Build Success"
                  android:textColor="#00FF00"
                  android:textSize="18sp" />
          </LinearLayout>
          EOF

          # 4. كود التشغيل (الجافا)
          cat <<'EOF' > app/src/main/java/com/rabie/tv/MainActivity.java
          package com.rabie.tv;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }
          EOF

          # 5. المانيفست (تصريح التطبيق)
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Rabie TV PRO" android:theme="@style/Theme.MaterialComponents.Light.NoActionBar">
                  <activity android:name="com.rabie.tv.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build_Final_APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload_Real_APK
        uses: actions/upload-artifact@v4
        with:
          name: RabieTV_Real_App
          path: app/build/outputs/apk/debug/*.apk
