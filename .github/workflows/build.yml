name: RabieTV_System_Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build_Files_For_Gradle_9
        run: |
          # 1. تنظيف شامل
          rm -rf *
          mkdir -p app/src/main/java/com/rabie/tv app/src/main/res/layout

          # 2. ملف settings.gradle (إلزامي في النسخة 9 لتحديد اسم المشروع)
          echo "rootProject.name = 'RabieTV'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # 3. ملف build.gradle الرئيسي (بناءً على طلب السيستم في الصورة 1000048480)
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 4. ملف app/build.gradle (تطبيق قانون الـ Namespace الإلزامي)
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rabie.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # 5. كود الجافا والمانيفست
          echo 'package com.rabie.tv; import android.app.Activity; public class MainActivity extends Activity { @Override protected void onCreate(android.os.Bundle s) { super.onCreate(s); android.widget.TextView t = new android.widget.TextView(this); t.setText("RabieTV PRO\nMatched with System ✅"); t.setGravity(android.view.Gravity.CENTER); setContentView(t); } }' > app/src/main/java/com/rabie/tv/MainActivity.java
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.rabie.tv"><application android:label="RabieTV"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml

      - name: System_Execution
        run: |
          # استعمال الـ Wrapper الخاص بـ 9.3.1 كما هو مفروض في صورك
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Final_Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RabieTV_System_APK
          path: app/build/outputs/apk/debug/*.apk
