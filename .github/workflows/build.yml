name: Rabie TV Final Trial
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Auto-Fix and Build
        run: |
          # صنع المجلدات
          mkdir -p app/src/main/java/com/rtv/tv/
          mkdir -p app/src/main/res/layout/
          
          # البحث عن ملفاتك ووضعها في مكانها الصحيح مهما كان اسمها
          find . -name "*.java" -exec cp {} app/src/main/java/com/rtv/tv/MainActivity.java \;
          find . -name "main.xml" -exec cp {} app/src/main/res/layout/main.xml \;
          find . -name "splash.xml" -exec cp {} app/src/main/res/layout/splash.xml \;

          # صنع ملفات الإعدادات (المفتاح)
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rtv.tv'
              compileSdk 34
              defaultConfig { applicationId "com.rtv.tv"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'org.videolan.android:libvlc-all:3.6.0'
          }
          EOF

          # صنع Manifest بسيط لتفادي الأخطاء
          mkdir -p app/src/main/
          echo "<?xml version='1.0' encoding='utf-8'?><manifest xmlns:android='http://schemas.android.com/apk/res/android' package='com.rtv.tv'><application android:label='Rabie TV'><activity android:name='.MainActivity' android:exported='true'><intent-filter><action android:name='android.intent.action.MAIN'/><category android:name='android.intent.category.LAUNCHER'/></intent-filter></activity></application></manifest>" > app/src/main/AndroidManifest.xml

          # البناء
          gradle wrapper
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Success
          path: app/build/outputs/apk/debug/*.apk
