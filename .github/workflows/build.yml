name: RabieTV_Final_Match
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup_Modern_Project
        run: |
          # تنظيف كامل للمخلفات القديمة التي تسبب الفشل
          rm -rf * mkdir -p app/src/main/java/com/rabie/tv app/src/main/res/layout

          # 1. إعدادات المستودعات العصرية (لحل مشكلة Plugin not found)
          cat <<'EOF' > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "RabieTV"
          include ':app'
          EOF

          # 2. ملف بناء التطبيق مع الـ Namespace الإلزامي
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application' version '8.2.2' }
          android {
              namespace 'com.rabie.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # 3. كود الجافا والمانيفست (الأساس)
          echo 'package com.rabie.tv; import android.app.Activity; public class MainActivity extends Activity { @Override protected void onCreate(android.os.Bundle s) { super.onCreate(s); android.widget.TextView t = new android.widget.TextView(this); t.setText("RabieTV: Mission Complete ✅"); t.setGravity(17); setContentView(t); } }' > app/src/main/java/com/rabie/tv/MainActivity.java
          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="RabieTV"><activity android:name="com.rabie.tv.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml

      - name: Build_Action
        run: |
          # استعمال الـ Wrapper لضمان استقرار البناء
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload_APK
        uses: actions/upload-artifact@v4
        with:
          name: RabieTV_Success_APK
          path: app/build/outputs/apk/debug/*.apk
