name: Build Rabie TV Pro
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Auto-Fix Structure
        run: |
          # هادا السطر يلقى وين راه الـ gradle ويجيبو للمكان الصح
          find . -name "build2.gradle" -exec cp {} app/build.gradle \;
          gradle wrapper

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Pro
          path: app/build/outputs/apk/debug/*.apk
