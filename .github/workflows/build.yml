name: Final Clean Build VLC
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Destroy and Rebuild Structure
        run: |
          # تنظيف شامل داخل السيرفر لتجنب تكرار الملفات
          mkdir -p final_src/app/src/main/java/com/rtv/tv/
          mkdir -p final_src/app/src/main/res/layout/
          
          # وضع كود الـ Java اللي عطيتهولي في مكانه الصحيح
          find . -name "MainActivity.java" -exec cp {} final_src/app/src/main/java/com/rtv/tv/MainActivity.java \;
          
          # نقل ملفات الـ XML (Splash و Main)
          find . -name "splash.xml" -exec cp {} final_src/app/src/main/res/layout/ \;
          find . -name "main.xml" -exec cp {} final_src/app/src/main/res/layout/ \;

          # صنع ملف الـ Gradle الموحد داخل السيرفر مباشرة
          cat <<EOF > final_src/app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rtv.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rtv.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'org.videolan.android:libvlc-all:3.6.0'
          }
          EOF

          # صنع ملف Settings
          echo "include ':app'" > final_src/settings.gradle
          
          # الانتقال للمجلد النظيف والبناء
          cd final_src
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Clean-VLC
          path: final_src/app/build/outputs/apk/debug/*.apk
