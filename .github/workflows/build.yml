name: Build Rabie TV VLC Final
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup VLC Project
        run: |
          # صنع المسار اللي مكتوب في الكود (com.rtv.tv)
          mkdir -p app/src/main/java/com/rtv/tv/
          # وضع كود الـ Java في مكانه الصحيح آلياً
          find . -name "*.java" -exec cp {} app/src/main/java/com/rtv/tv/ \;
          # تفعيل ملف الـ Gradle اللي فيه مكتبة VLC
          cp app/build2.gradle app/build.gradle || cp build2.gradle app/build.gradle

      - name: Build APK
        run: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-VLC-Final
          path: app/build/outputs/apk/debug/*.apk
