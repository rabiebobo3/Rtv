name: RabieTV_Final_Fix
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout_Code
        uses: actions/checkout@v4

      - name: Set_up_Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build_Project_Files
        run: |
          # 1. تنظيف وبناء المجلدات
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          mkdir -p app/src/main/java/com/rabie/tv app/src/main/res/layout

          # 2. ملف settings.gradle
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "RabieTV"
          include ':app'
          EOF

          # 3. ملف build.gradle (Root)
          echo "plugins { id 'com.android.application' version '8.2.2' apply false }" > build.gradle

          # 4. ملف app/build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.rabie.tv'
              compileSdk 34
              defaultConfig {
                  applicationId "com.rabie.tv"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # 5. المانيفست
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="RabieTV">
                  <activity android:name="com.rabie.tv.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 6. كود الجافا
          cat <<EOF > app/src/main/java/com/rabie/tv/MainActivity.java
          package com.rabie.tv;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText("RabieTV Success ✅");
                  setContentView(tv);
              }
          }
          EOF

      - name: Run_Gradle_Build
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload_APK
        uses: actions/upload-artifact@v4
        with:
          name: RabieTV_APK
          path: app/build/outputs/apk/debug/*.apk
