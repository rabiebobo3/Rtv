name: Build Rabie TV Pro

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: System Cleanup
        run: |
          # مسح شامل لأي ملف أو مجلد مشوه بالعربية
          rm -rf *المسار*
          # بناء ملف التشغيل
          gradle wrapper
          chmod +x gradlew

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Pro
          path: app/build/outputs/apk/debug/*.apk
